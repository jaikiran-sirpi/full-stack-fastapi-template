name: Notify on Failure

on:
  workflow_run:
    workflows:
      - "Test Backend"
      - "Dependency Scan"
      - "Container Scan"
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Create GitHub Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline Failed: ${context.payload.workflow_run.name}`,
              body: `## Pipeline Failure\n\n**Workflow:** ${context.payload.workflow_run.name}\n**Branch:** ${context.payload.workflow_run.head_branch}\n**URL:** ${context.payload.workflow_run.html_url}`
            })
